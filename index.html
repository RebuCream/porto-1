<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Portfolio Saya</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
margin:0;
text-align:center;
}

.container{
position:relative;
padding-top:60px;
}

.profile img{
width:150px;
border-radius:50%;
border:3px solid white;
}

.card{
position:absolute;
top:20px;
width:260px;
background:#111;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(255,255,255,0.2);
}

.left{
left:10%;
}

.right{
right:10%;
}

.skills{
margin-top:100px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.skill{
background:#111;
padding:20px 30px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.skill:hover{
background:#333;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
}

.popup-content{
margin-top:100px;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:30px;
cursor:pointer;
}

iframe{
max-width:90%;
}

img.gallery{
width:400px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="profile">
<img src="profile.jpg">
</div>

<div class="card left">
<h2>Tentang Saya</h2>
<p>Saya adalah editor video, fotografer, dan juga belajar coding.</p>
</div>

<div class="card right">
<h2>Perkenalan</h2>
<p>Ini adalah website portfolio saya untuk menampilkan karya saya.</p>
</div>

</div>

<div class="skills">

<div class="skill" onclick="openPopup('edit')">
🎬 Editing
</div>

<div class="skill" onclick="openPopup('photo')">
📷 Fotografi
</div>

<div class="skill" onclick="openPopup('coding')">
💻 Coding
</div>

</div>

<div id="popup" class="popup">

<span class="close" onclick="closePopup()">✖</span>

<div id="popup-content" class="popup-content"></div>

</div>

<script>

function openPopup(type){

const popup=document.getElementById("popup");
const content=document.getElementById("popup-content");

popup.style.display="block";

if(type==="edit"){
content.innerHTML=`
<h2>Contoh Editing</h2>

<iframe width="560" height="315"
src="https://www.youtube.com/embed/VIDEOID"
frameborder="0"
allowfullscreen>
</iframe>
`;
}

if(type==="photo"){
content.innerHTML=`
<h2>Fotografi</h2>
<img src="photo1.jpg" class="gallery">
`;
}

if(type==="coding"){
content.innerHTML=`
<h2>Project Coding</h2>
<p>Saya membuat website portfolio dan project web lainnya.</p>
`;
}

}

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
